# ── Database (H2 in-memory for tests) ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── Schema initialization ────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Auth Server settings ──────────────────────────────────────────────────────
auth.issuer-uri=http://localhost:9000

# ── RSA key material (empty = ephemeral keys for tests) ──────────────────────
rsa.private-key=
rsa.public-key=

# ── Minecraft client (test credentials) ──────────────────────────────────────
minecraft.client.id=minecraft-server
minecraft.client.secret=test-secret
