# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=auth-server

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=AuthServerPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── Schema initialization ────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Server ───────────────────────────────────────────────────────────────────
server.port=9000
server.error.include-stacktrace=never
server.error.include-message=never

# ── Auth Server settings ──────────────────────────────────────────────────────
auth.issuer-uri=${AUTH_ISSUER_URI:http://localhost:9000}

# ── RSA key material ─────────────────────────────────────────────────────────
rsa.private-key=${RSA_PRIVATE_KEY:}
rsa.public-key=${RSA_PUBLIC_KEY:}

# ── Minecraft server client ───────────────────────────────────────────────────
minecraft.client.id=${MINECRAFT_CLIENT_ID:minecraft-server}
minecraft.client.secret=${MINECRAFT_CLIENT_SECRET}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.platform.authserver=DEBUG
logging.level.org.springframework.security=INFO
